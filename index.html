<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Restaurante UCC - Sebastian</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #1a1208;
    min-height: 100vh;
    padding: 2rem 1rem;
    color: #f5ede0;
  }
  .app {
    max-width: 680px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255,200,100,0.2);
  }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8963c;
    margin-bottom: 0.5rem;
  }
  .header h1 {
    font-size: 28px;
    font-weight: normal;
    color: #f5ede0;
    letter-spacing: 1px;
  }
  .header p {
    font-size: 13px;
    color: #9e8c77;
    margin-top: 4px;
    font-style: italic;
  }
  .action-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .btn-new {
    flex: 1;
    min-width: 160px;
    padding: 14px 20px;
    background: #c8963c;
    color: #1a1208;
    border: none;
    border-radius: 6px;
    font-family: 'Georgia', serif;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-new:hover { background: #e0ab4e; }
  .btn-new:active { transform: scale(0.98); }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,200,100,0.15);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .stat-number {
    font-size: 22px;
    font-weight: bold;
    color: #c8963c;
    display: block;
  }
  .stat-label {
    font-size: 11px;
    color: #9e8c77;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9e8c77;
    margin-bottom: 1rem;
  }
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #5c5040;
    font-style: italic;
  }
  .order-card {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,200,100,0.15);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .order-card:hover { border-color: rgba(200,150,60,0.4); }
  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .order-id {
    font-size: 13px;
    color: #9e8c77;
  }
  .order-id span {
    color: #f5ede0;
    font-size: 16px;
  }
  .order-price {
    font-size: 18px;
    color: #c8963c;
    font-weight: bold;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .s-requested { background: rgba(55,138,221,0.15); color: #85b7eb; }
  .s-requested .status-dot { background: #378add; }
  .s-cooking { background: rgba(239,159,39,0.15); color: #ef9f27; }
  .s-cooking .status-dot { background: #ef9f27; animation: pulse 1s infinite; }
  .s-served { background: rgba(99,153,34,0.15); color: #97c459; }
  .s-served .status-dot { background: #97c459; }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
  }
  .order-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    min-width: 100px;
    padding: 9px 12px;
    border: 0.5px solid;
    border-radius: 6px;
    font-family: 'Georgia', serif;
    font-size: 12px;
    cursor: pointer;
    background: transparent;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .action-btn:active { transform: scale(0.97); }
  .btn-cook { border-color: rgba(239,159,39,0.4); color: #ef9f27; }
  .btn-cook:hover { background: rgba(239,159,39,0.1); }
  .btn-serve { border-color: rgba(99,153,34,0.4); color: #97c459; }
  .btn-serve:hover { background: rgba(99,153,34,0.1); }
  .btn-pay { border-color: rgba(226,75,74,0.4); color: #e24b4a; }
  .btn-pay:hover { background: rgba(226,75,74,0.1); }
  .btn-disabled {
    opacity: 0.3;
    cursor: default;
    pointer-events: none;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #c8963c;
    color: #1a1208;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    transition: transform 0.3s ease;
    z-index: 99;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge">Sistema de Pedidos</div>
    <h1>Restaurante UCC</h1>
    <p>Pasto, Nariño &mdash; Gestión de mesas</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <span class="stat-number" id="stat-total">0</span>
      <span class="stat-label">Pedidos</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-cooking">0</span>
      <span class="stat-label">En cocina</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-revenue">$0</span>
      <span class="stat-label">Facturado</span>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn-new" onclick="createOrder()">+ Nuevo pedido</button>
  </div>

  <div class="section-title">Pedidos activos</div>
  <div id="order-list">
    <div class="empty-state" id="empty-msg">No hay pedidos activos.<br>Crea uno nuevo para empezar.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  class Order {
    constructor(id, state, total) {
      this.id = id; this.state = state; this.total = parseFloat(total);
    }
  }

  let orders = [];
  let currentId = 1;
  let revenue = 0;

  const statusMap = {
    'Requested': { label: 'Solicitado', cls: 's-requested' },
    'Cooking':   { label: 'En cocina',  cls: 's-cooking' },
    'Served':    { label: 'Servido',    cls: 's-served' }
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = orders.length;
    document.getElementById('stat-cooking').textContent = orders.filter(o => o.state === 'Cooking').length;
    document.getElementById('stat-revenue').textContent = '$' + revenue.toFixed(2);
  }

  function render() {
    const list = document.getElementById('order-list');
    const empty = document.getElementById('empty-msg');
    if (orders.length === 0) {
      list.innerHTML = '';
      list.appendChild(empty);
      updateStats();
      return;
    }
    list.innerHTML = '';
    orders.forEach(o => {
      const s = statusMap[o.state];
      const canCook  = o.state === 'Requested';
      const canServe = o.state === 'Cooking';
      const canPay   = o.state === 'Served';
      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div class="order-top">
          <div class="order-id">Mesa <span>#${String(o.id).padStart(2,'0')}</span></div>
          <div class="order-price">$${o.total.toFixed(2)}</div>
        </div>
        <div>
          <span class="status-badge ${s.cls}">
            <span class="status-dot"></span>${s.label}
          </span>
        </div>
        <div class="order-actions">
          <button class="action-btn btn-cook ${canCook?'':'btn-disabled'}" onclick="changeState(${o.id},'Cooking')">
            Enviar a cocina
          </button>
          <button class="action-btn btn-serve ${canServe?'':'btn-disabled'}" onclick="changeState(${o.id},'Served')">
            Marcar servido
          </button>
          <button class="action-btn btn-pay ${canPay?'':'btn-disabled'}" onclick="payOrder(${o.id})">
            Cobrar y cerrar
          </button>
        </div>
      `;
      list.appendChild(card);
    });
    updateStats();
  }

  function createOrder() {
    const total = (Math.random() * 50 + 10).toFixed(2);
    orders.push(new Order(currentId++, 'Requested', total));
    render();
    showToast('Pedido #' + String(currentId-1).padStart(2,'0') + ' creado');
  }

  function changeState(id, state) {
    const o = orders.find(o => o.id === id);
    if (o) { o.state = state; render(); }
    const labels = { Cooking: 'En cocina', Served: 'Listo para cobrar' };
    showToast('Orden #' + String(id).padStart(2,'0') + ' — ' + labels[state]);
  }

  function payOrder(id) {
    const o = orders.find(o => o.id === id);
    if (!o) return;
    revenue += o.total;
    orders = orders.filter(o => o.id !== id);
    render();
    showToast('Cobrado $' + o.total.toFixed(2) + ' — ¡Gracias!');
  }

  render();
</script>
</body>
</html>
