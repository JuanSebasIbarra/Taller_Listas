<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Suministros UCC - Sebastian</title>
<style>
  /* Se mantiene tu estilo elegante con ajustes de colores para Supply Chain */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #0d1117;
    min-height: 100vh;
    padding: 2rem 1rem;
    color: #f5ede0;
  }
  .app { max-width: 800px; margin: 0 auto; }
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(100,200,255,0.2);
  }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #58a6ff;
    margin-bottom: 0.5rem;
  }
  .header h1 { font-size: 28px; font-weight: normal; color: #f5ede0; }
  .header p { font-size: 13px; color: #8b949e; margin-top: 4px; font-style: italic; }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(88,166,255,0.15);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .stat-number { font-size: 22px; font-weight: bold; color: #58a6ff; display: block; }
  .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-top: 2px; }

  .btn-new {
    width: 100%;
    padding: 14px;
    background: #238636;
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'Georgia', serif;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 2rem;
  }

  .order-card {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 15px;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    margin-bottom: 15px;
  }
  /* Colores por Agente según el diagrama */
  .s-shipping   { background: rgba(56, 139, 253, 0.15); color: #58a6ff; }
  .s-seller     { background: rgba(210, 153, 34, 0.15); color: #d29922; }
  .s-supervisor { background: rgba(188, 140, 255, 0.15); color: #bc8cff; }
  .s-receive    { background: rgba(63, 185, 80, 0.15); color: #3fb950; }

  .order-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .action-btn {
    padding: 8px;
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    background: transparent;
    color: #f5ede0;
    font-size: 11px;
    cursor: pointer;
  }
  .action-btn:hover { background: rgba(255,255,255,0.05); }
  .btn-disabled { opacity: 0.2; cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #58a6ff; color: #0d1117; padding: 10px 20px; border-radius: 5px;
    display: none; font-weight: bold;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge">Supply Chain Management</div>
    <h1>Sistema de Suministros UCC</h1>
    <p>Flujo: Shipping &rarr; Buyer &rarr; Seller &rarr; Supervisor &rarr; Receiving</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <span class="stat-number" id="stat-active">0</span>
      <span class="stat-label">En Proceso</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-approved">0</span>
      <span class="stat-label">Aprobados</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-completed">0</span>
      <span class="stat-label">Recibidos</span>
    </div>
  </div>

  <button class="btn-new" onclick="createRequisition()">+ Nueva Requisición (Shipping Office)</button>

  <div id="order-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Definición de Estados según el diagrama
  const STAGES = {
    REQUISITION: { label: 'Shipping: Prepare Requisition', cls: 's-shipping' },
    QUOTE_PREP:  { label: 'Seller: Actual Quote Preparation', cls: 's-seller' },
    REVIEW:      { label: 'Supervisor: Quote Review', cls: 's-supervisor' },
    RECEIVE:     { label: 'Receive Agent: Receive Product', cls: 's-receive' }
  };

  let items = [];
  let stats = { approved: 0, completed: 0 };

  function createRequisition() {
    const id = Math.floor(Math.random() * 9000) + 1000;
    items.push({ id, stage: 'REQUISITION', approved: false });
    render();
    showToast(`Requisición #${id} creada por Shipping Office`);
  }

  function advance(id, nextStage) {
    const item = items.find(i => i.id === id);
    if (item) {
      item.stage = nextStage;
      if (nextStage === 'REVIEW') item.approved = true; 
      render();
      showToast(`Orden #${id} enviada a ${STAGES[nextStage].label}`);
    }
  }

  function finalize(id) {
    items = items.filter(i => i.id !== id);
    stats.completed++;
    render();
    showToast(`Orden #${id} completada y almacenada.`);
  }

  function render() {
    const list = document.getElementById('order-list');
    list.innerHTML = '';
    
    document.getElementById('stat-active').textContent = items.length;
    document.getElementById('stat-approved').textContent = items.filter(i => i.approved).length;
    document.getElementById('stat-completed').textContent = stats.completed;

    items.forEach(i => {
      const config = STAGES[i.stage];
      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
          <span style="font-size:14px">Requisición <b>#${i.id}</b></span>
          <span class="status-badge ${config.cls}">${config.label}</span>
        </div>
        <div class="order-actions">
          <button class="action-btn ${i.stage==='REQUISITION'?'':'btn-disabled'}" 
                  onclick="advance(${i.id}, 'QUOTE_PREP')">Enviar a Seller</button>
          <button class="action-btn ${i.stage==='QUOTE_PREP'?'':'btn-disabled'}" 
                  onclick="advance(${i.id}, 'REVIEW')">Enviar a Supervisor</button>
          <button class="action-btn ${i.stage==='REVIEW'?'':'btn-disabled'}" 
                  onclick="advance(${i.id}, 'RECEIVE')">Autorizar Recepción</button>
          <button class="action-btn ${i.stage==='RECEIVE'?'':'btn-disabled'}" 
                  onclick="finalize(${i.id})">Confirmar Recibido</button>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function showToast(m) {
    const t = document.getElementById('toast');
    t.style.display = 'block'; t.textContent = m;
    setTimeout(() => t.style.display = 'none', 2500);
  }

  render();
</script>
</body>
</html>
