<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>UCC Supply Chain Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --side: #161b22;
      --card: #21262d;
      --primary: #58a6ff;
      --success: #238636;
      --text: #c9d1d9;
      --border: #30363d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    /* --- SIDEBAR --- */
    .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; }
    .logo-area { text-align: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .logo-area h2 { color: var(--primary); font-size: 1.2rem; }
    
    .nav-group { margin-bottom: 2rem; }
    .nav-title { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.8rem; }
    .nav-item { padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
    .nav-item:hover { background: var(--card); }
    .nav-item.active { background: #1f6feb; color: white; }

    /* --- MAIN CONTENT --- */
    .content { margin-left: 260px; flex: 1; padding: 2rem; }
    .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    
    .search-bar { background: #010409; border: 1px solid var(--border); padding: 0.6rem 1rem; border-radius: 6px; color: white; width: 300px; outline: none; }
    .search-bar:focus { border-color: var(--primary); }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--side); padding: 1.2rem; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
    .stat-val { display: block; font-size: 1.5rem; font-weight: bold; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: #8b949e; }

    /* --- CARDS --- */
    .orders-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .order-card { background: var(--side); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; position: relative; transition: transform 0.2s; }
    .order-card:hover { transform: translateY(-3px); border-color: #8b949e; }
    
    .badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 12px; font-weight: bold; text-transform: uppercase; position: absolute; top: 1.5rem; right: 1.5rem; }
    .b-shipping { background: rgba(56,139,253,0.15); color: #58a6ff; }
    .b-seller { background: rgba(210,153,34,0.15); color: #d29922; }
    .b-supervisor { background: rgba(188,140,255,0.15); color: #bc8cff; }
    .b-receive { background: rgba(63,185,80,0.15); color: #3fb950; }

    .order-id { font-weight: bold; margin-bottom: 0.5rem; display: block; }
    .order-price { font-size: 1.2rem; color: #f0f6fc; margin-bottom: 1rem; display: block; }
    
    .workflow { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .step-btn { padding: 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 0.8rem; text-align: left; transition: 0.2s; }
    .step-btn:not(.disabled):hover { border-color: var(--primary); background: #30363d; }
    .step-btn.disabled { opacity: 0.2; cursor: not-allowed; }
    .step-btn.completed { background: rgba(35, 134, 54, 0.2); border-color: var(--success); color: #7ee787; }

    .btn-create { background: var(--success); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: auto; }

    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: var(--bg); padding: 12px 24px; border-radius: 6px; font-weight: bold; display: none; animation: slideUp 0.3s; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo-area">
      <h2>UCC Logística</h2>
    </div>
    
    <div class="nav-group">
      <p class="nav-title">Vistas</p>
      <div class="nav-item active" onclick="filterBy('ALL')">📦 Todas las órdenes</div>
      <div class="nav-item" onclick="filterBy('REQUISITION')">📑 Requisiciones</div>
      <div class="nav-item" onclick="filterBy('REVIEW')">⚖️ Por Aprobar</div>
    </div>

    <div class="nav-group">
      <p class="nav-title">Reportes</p>
      <div class="nav-item">📊 Rendimiento</div>
      <div class="nav-item">🖨️ Historial Facturas</div>
    </div>

    <button class="btn-create" onclick="createOrder()">+ Nueva Requisición</button>
  </aside>

  <main class="content">
    <header class="top-header">
      <h1>Panel de Control</h1>
      <input type="text" id="searchInput" class="search-bar" placeholder="Buscar por ID..." onkeyup="handleSearch()">
    </header>

    <div class="stats-grid">
      <div class="stat-card"><span class="stat-val" id="stat-active">0</span><span class="stat-label">En Proceso</span></div>
      <div class="stat-card"><span class="stat-val" id="stat-total-money">$0</span><span class="stat-label">Valor Total</span></div>
      <div class="stat-card"><span class="stat-val" id="stat-done">0</span><span class="stat-label">Completadas</span></div>
    </div>

    <div id="orders-list" class="orders-container">
      </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    // --- LÓGICA DE LAS CLASES INTEGRADAS ---
    let orders = [];
    let completedCount = 0;
    let currentFilter = 'ALL';

    const STAGES = {
      REQUISITION: { label: 'Shipping', cls: 'b-shipping', step: 1 },
      QUOTE:       { label: 'Seller', cls: 'b-seller', step: 2 },
      REVIEW:      { label: 'Supervisor', cls: 'b-supervisor', step: 3 },
      RECEIVE:     { label: 'Receiving', cls: 'b-receive', step: 4 }
    };

    function createOrder() {
      const id = Math.floor(Math.random() * 9000) + 1000;
      const price = (Math.random() * 500 + 50).toFixed(2);
      orders.push({ id, stage: 'REQUISITION', price: parseFloat(price) });
      render();
      notify(`Requisición #${id} creada`);
    }

    function advance(id, nextStage) {
      const order = orders.find(o => o.id === id);
      if (order) {
        order.stage = nextStage;
        render();
        notify(`Orden #${id} movida a ${nextStage}`);
      }
    }

    function finalize(id) {
      orders = orders.filter(o => o.id !== id);
      completedCount++;
      render();
      notify(`Orden #${id} archivada exitosamente`);
    }

    function render() {
      const container = document.getElementById('orders-list');
      container.innerHTML = '';

      const filtered = orders.filter(o => {
        const matchesFilter = currentFilter === 'ALL' || o.stage === currentFilter;
        return matchesFilter;
      });

      // Actualizar Stats
      document.getElementById('stat-active').textContent = orders.length;
      document.getElementById('stat-done').textContent = completedCount;
      const total = orders.reduce((acc, curr) => acc + curr.price, 0);
      document.getElementById('stat-total-money').textContent = `$${total.toFixed(2)}`;

      filtered.forEach(o => {
        const config = STAGES[o.stage];
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
          <span class="badge ${config.cls}">${config.label}</span>
          <span class="order-id">Orden #${o.id}</span>
          <span class="order-price">$${o.price}</span>
          
          <div class="workflow">
            <button class="step-btn ${o.stage==='REQUISITION'?'':'disabled'} ${config.step>1?'completed':''}" 
                    onclick="${o.stage==='REQUISITION'?'advance('+o.id+', \'QUOTE\')':''}">
              1. Preparar Cotización (Seller)
            </button>
            <button class="step-btn ${o.stage==='QUOTE'?'':'disabled'} ${config.step>2?'completed':''}" 
                    onclick="${o.stage==='QUOTE'?'advance('+o.id+', \'REVIEW\')':''}">
              2. Revisión de Supervisor
            </button>
            <button class="step-btn ${o.stage==='REVIEW'?'':'disabled'} ${config.step>3?'completed':''}" 
                    onclick="${o.stage==='REVIEW'?'advance('+o.id+', \'RECEIVE\')':''}">
              3. Autorizar Recepción
            </button>
            <button class="step-btn ${o.stage==='RECEIVE'?'':'disabled'}" 
                    onclick="${o.stage==='RECEIVE'?'finalize('+o.id+')':''}">
              4. Recibir y Facturar
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function filterBy(f) {
      currentFilter = f;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      render();
    }

    function handleSearch() {
      const val = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('.order-card');
      cards.forEach(card => {
        const id = card.querySelector('.order-id').textContent;
        card.style.display = id.includes(val) ? 'block' : 'none';
      });
    }

    function notify(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    render();
  </script>
</body>
</html>
